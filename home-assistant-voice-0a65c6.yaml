substitutions:
  name: home-assistant-voice-0a65c6
  friendly_name: Home Assistant Voice 0a65c6

packages:
  Nabu Casa.Home Assistant Voice PE: github://esphome/home-assistant-voice-pe/home-assistant-voice.yaml@26.4.0

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}

api:
  encryption:
    key: p7tD/fVmTNE0qFba3mNY3gn1MpJJKl9pw7NNn7OzRZs=

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

globals:
  - id: waiting_for_wake_word
    type: bool
    restore_value: false
    initial_value: 'true'

voice_assistant:
  noise_suppression_level: 3
  auto_gain: 31dBFS
  volume_multiplier: 1.5
  on_client_connected:
    - delay: 2s
    - lambda: |
        id(waiting_for_wake_word) = true;
        id(va).set_use_wake_word(true);
    - voice_assistant.start:
  on_listening:
    - if:
        condition:
          lambda: return id(waiting_for_wake_word);
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
          - script.execute: control_leds
  on_wake_word_detected:
    - lambda: id(waiting_for_wake_word) = false;
    - if:
        condition:
          switch.is_on: wake_sound
        then:
          - script.execute:
              id: play_sound
              priority: true
              sound_file: "wake_word_triggered_sound"
          - delay: 300ms
    - homeassistant.event:
        event: esphome.wake_word_detected
        data:
          device_name: "${friendly_name}"
          device_id: "${name}"
  on_tts_start:
    - microphone.mute:
  on_tts_end:
    - microphone.unmute:
