substitutions:
  name: home-assistant-voice-0a65c6
  friendly_name: Home Assistant Voice 0a65c6

packages:
  Nabu Casa.Home Assistant Voice PE: github://esphome/home-assistant-voice-pe/home-assistant-voice.yaml@26.4.0

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}
  on_boot:
    priority: -200
    then:
      - lambda: |-
          id(hey_bob).set_probability_cutoff(153);

api:
  encryption:
    key: p7tD/fVmTNE0qFba3mNY3gn1MpJJKl9pw7NNn7OzRZs=

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

voice_assistant:
  noise_suppression_level: 3
  auto_gain: 31dBFS
  volume_multiplier: 1.5
  on_wake_word_detected:
    - homeassistant.event:
        event: esphome.wake_word_detected
        data:
          device_name: "${friendly_name}"
          device_id: "${name}"
  on_tts_start:
    - microphone.mute:
  on_tts_end:
    - microphone.unmute:

interval:
  - interval: 300ms
    then:
      - if:
          condition:
            media_player.is_announcing:
              id: external_media_player
          then:
            - micro_wake_word.enable_model: stop
          else:
            - if:
                condition:
                  switch.is_off: timer_ringing
                then:
                  - micro_wake_word.disable_model: stop

micro_wake_word:
  models:
    - model: https://raw.githubusercontent.com/biogas9/slatra-wake-word-models/main/hey_bob.json
      id: hey_bob

select:
  - id: !extend wake_word_sensitivity
    on_value:
      - lambda: |-
          if (x == "Slightly sensitive") {
            id(okay_nabu).set_probability_cutoff(217);
            id(hey_jarvis).set_probability_cutoff(247);
            id(hey_mycroft).set_probability_cutoff(253);
            id(hey_bob).set_probability_cutoff(220);
          } else if (x == "Moderately sensitive") {
            id(okay_nabu).set_probability_cutoff(176);
            id(hey_jarvis).set_probability_cutoff(235);
            id(hey_mycroft).set_probability_cutoff(242);
            id(hey_bob).set_probability_cutoff(200);
          } else if (x == "Very sensitive") {
            id(okay_nabu).set_probability_cutoff(143);
            id(hey_jarvis).set_probability_cutoff(212);
            id(hey_mycroft).set_probability_cutoff(237);
            id(hey_bob).set_probability_cutoff(180);
          }
